{{- if .Values.mysql.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: mysql
  labels:
    {{- include "bisheng.componentLabels" (dict "component" "mysql" "context" $) | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 3306
      targetPort: 3306
      protocol: TCP
  selector:
    {{- include "bisheng.componentSelectorLabels" (dict "component" "mysql" "context" $) | nindent 4 }}
{{- end }}
