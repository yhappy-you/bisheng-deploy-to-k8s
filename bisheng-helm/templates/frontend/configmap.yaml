apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "bisheng.componentFullname" (dict "component" "frontend" "context" $) }}
  labels:
    {{- include "bisheng.componentLabels" (dict "component" "frontend" "context" $) | nindent 4 }}
data:
  nginx.conf: |
    user  nginx;
    worker_processes  auto;
    error_log  /var/log/nginx/error.log notice;
    pid        /var/run/nginx.pid;
    events {
        worker_connections  1024;
    }
    http {
        include       /etc/nginx/mime.types;
        default_type  application/octet-stream;
        log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                          '$status $body_bytes_sent "$http_referer" '
                          '"$http_user_agent" "$http_x_forwarded_for"';
        access_log  /var/log/nginx/access.log  main;
        sendfile        on;
        keepalive_timeout  65;
        include /etc/nginx/conf.d/*.conf;
    }
  default.conf: |
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }
    server {
        gzip on;
        gzip_comp_level  2;
        gzip_min_length  1000;
        gzip_types  text/xml text/css;
        gzip_http_version 1.1;
        gzip_vary  on;
        gzip_disable "MSIE [4-6] \.";
        listen 3001;
        location / {
            root /usr/share/nginx/html/platform;
            index index.html index.htm;
            location = /index.html {
                add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
                add_header Pragma "no-cache" always;
                add_header Expires 0 always;
            }
            try_files $uri $uri/ /index.html =404;
            add_header X-Frame-Options SAMEORIGIN;
        }
        location /workspace/ {
            alias /usr/share/nginx/html/client/;
            index index.html index.htm;
            location = /workspace/index.html {
                add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
                add_header Pragma "no-cache" always;
                add_header Expires 0 always;
            }
            try_files $uri $uri/ /workspace/index.html;
        }
        location ~ ^(/workspace)?/api(/|$) {
            rewrite ^/workspace(/.*)$ $1 break;
            proxy_pass http://backend:7860;
            proxy_read_timeout 300s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            client_max_body_size 200m;
            add_header Access-Control-Allow-Origin $host;
            add_header X-Frame-Options SAMEORIGIN;
        }
        location ~ ^(/workspace)?/bisheng|/tmp-dir {
            rewrite ^/workspace(/.*)$ $1 break;
            proxy_pass http://minio:9000;
        }
    }
  websocket.conf: |
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }
    server {
        gzip on;
        gzip_comp_level  2;
        gzip_min_length  1000;
        gzip_types  text/xml text/css;
        gzip_http_version 1.1;
        gzip_vary  on;
        gzip_disable "MSIE [4-6] \.";
        listen 8443;
        location /api {
            proxy_pass http://backend:7860;
            proxy_read_timeout 300s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            client_max_body_size 50m;
        }
    }
